<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實境尋寶雷達 V3</title>
    <style>
        body {
            margin: 0;
            background-color: #051105;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }

        #radarCanvas {
            border: 2px solid #00ff00;
            border-radius: 50%;
            background-color: rgba(0, 20, 0, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        #info-panel {
            margin-top: 20px;
            width: 90%;
            max-width: 400px;
            background: rgba(0, 40, 0, 0.7);
            border: 1px solid #00ff00;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .status-item {
            margin: 5px 0;
            font-size: 0.9rem;
        }

        #hint {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffcc00;
            text-align: center;
            margin-top: 10px;
            text-shadow: 0 0 5px #ffcc00;
        }
    </style>
</head>

    </div>
